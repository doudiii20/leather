<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fiche Produit - Royal Leather</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container product-page">
    <a class="back-link" href="./index.html">← Retour au catalogue</a>

    <section class="card product-card">
      <div class="product-media" id="productMedia">
        <img id="productImage" class="product-image" alt="" />
        <span id="productMediaFallback" class="product-media-fallback">RL</span>
      </div>
      <div class="product-info">
        <p class="badge">Fiche Article</p>
        <h1 id="productName">Article</h1>
        <p id="productRef" class="muted">Reference #</p>
        <p id="productPrice" class="price">0.00 TND</p>
        <p class="desc">
          Produit en cuir premium concu pour un usage quotidien avec une finition artisanale.
        </p>
        <button class="btn">Ajouter au panier</button>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id") || "N/A";
      const nom = params.get("nom") || "Article Royal Leather";
      const prix = params.get("prix") || "0.00";
      const imgParam = params.get("img");

      document.title = nom + " - Royal Leather";
      document.getElementById("productName").textContent = nom;
      document.getElementById("productRef").textContent = "Reference #" + id;
      document.getElementById("productPrice").textContent = Number(prix).toFixed(2) + " TND";

      const productImage = document.getElementById("productImage");
      const fallback = document.getElementById("productMediaFallback");

      if (imgParam && imgParam.trim() !== "") {
        const resolved = new URL(imgParam.trim(), window.location.href).href;
        productImage.alt = nom;
        productImage.onload = function () {
          fallback.style.display = "none";
          productImage.classList.add("product-image--visible");
        };
        productImage.onerror = function () {
          productImage.classList.remove("product-image--visible");
          productImage.removeAttribute("src");
          fallback.style.display = "grid";
        };
        productImage.src = resolved;
      } else {
        productImage.style.display = "none";
        fallback.style.display = "grid";
      }
    })();
  </script>
</body>
</html>
